<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore exciting travel packages with Cavite Tigers Travel and Tours. Your adventure starts here!">
    <meta name="keywords" content="Cavite travel, tours, travel packages, destinations, adventure">
    <title>Cavite Tiger Travel and Tours</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for Social Media Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Readability Enhancements */
        body {
            font-size: 18px; /* Larger font size for readability */
            line-height: 1.6; /* Better line spacing */
            margin: 0;
            padding: 0;
            background-color: #f9f9f9; /* Soft background color for contrast */
        }

        h1, h2, h3 {
            font-size: 2em; /* Increase heading sizes */
            margin: 20px 0; /* Spacing above and below headings */
        }

        p {
            font-size: 1.2em; /* Larger paragraph text */
            padding: 10px 0;
            margin: 0; /* Remove default margin for better spacing control */
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.9); /* Slightly transparent for effect */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        nav ul {
            display: flex;
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            font-size: 1.2em; /* Larger navigation text */
            color: #333;
            text-decoration: none;
            padding: 10px;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #ff6f61; /* Highlight color on hover */
        }

        .hero-section {
            position: relative;
            text-align: center;
            padding: 50px 20px;
            color: white;
            background-size: cover;
            background-position: center;
            margin-bottom: 20px; /* Space below hero section */
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-content h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .hero-content p {
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        button {
            font-size: 1.2em; /* Larger button text */
            padding: 15px 20px; /* More padding for easier clicking */
            background-color: #ff6f61;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px; /* Rounded corners for the button */
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #ff5039; /* Darker shade on hover */
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em; /* Smaller heading on mobile */
            }

            h2 {
                font-size: 1.8em; /* Smaller subheadings on mobile */
            }

            .hero-content p {
                font-size: 1.2em; /* Smaller paragraph text on mobile */
            }

            button {
                width: 100%; /* Full-width button on mobile */
            }

            nav {
                flex-direction: column;
                align-items: flex-start;
            }

            nav ul {
                flex-direction: column;
                width: 100%;
                padding: 0; /* Reset padding */
            }

            nav ul li {
                margin-left: 0; /* Remove left margin on mobile */
                margin-top: 10px; /* Space between items */
                width: 100%; /* Full width links */
                text-align: center; /* Center align links */
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="transparent" id="navbar" role="navigation">
            <img src="CaviteTigerLogo.jpg" alt="Cavite Tigers Logo" class="logo">
            <ul>
                <li><a href="#hero">Home</a></li>
                 <li><a href="TopDestinations.html">Destinations</a></li>
                <li><a href="Travel Packages.html">Packages</a></li>
                <li><a href="About Us.html">About Us</a></li>
                <li><a href="Contact Us.html">Contact Us</a></li>
                <!-- Social Media Links -->
                <li><a href="https://www.facebook.com/TigertoursinCavite" target="_blank"><i class="fab fa-facebook-f"></i></a></li>
                <li><a href="https://www.instagram.com/cavitetigers2021" target="_blank"><i class="fab fa-instagram"></i></a></li>
                <li><a href="https://www.tiktok.com/@cavitetigers2021?_t=8q98ZuMtEh8&_r=1" target="_blank"><i class="fab fa-tiktok"></i></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero-section" style="background-image: url('BookNow.jpg');">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>Welcome to Cavite Tigers Travel and Tours</h1>
                <p>Your adventure starts here! Choose from exciting packages, and let us take care of everything for you.</p>
                <button onclick="bookNow()">Book Now</button>
            </div>
        </section>

        <!-- Add more sections like Destinations, Packages, About, and Contact here -->
    </main>

    <footer>
        <p>&copy; 2024 Cavite Tigers Travel and Tours. All Rights Reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
